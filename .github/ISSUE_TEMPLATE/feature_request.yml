---
name: ✨ Feature Request
description: Предложить новую функцию
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Спасибо за предложение! Пожалуйста, опишите вашу идею.
  - type: textarea
    id: problem
    attributes:
      label: Проблема
      description: Какую проблему решает эта функция?
      placeholder: Я всегда хотел...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Решение
      description: Как вы представляете реализацию?
      placeholder: Опишите ваше решение
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Альтернативы
      description: Какие есть альтернативные решения?
  - type: textarea
    id: additional
    attributes:
      label: Дополнительная информация
      description: Скриншоты, макеты, примеры
