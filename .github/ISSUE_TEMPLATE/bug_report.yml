---
name: 🐛 Bug Report
description: Сообщить об ошибке
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Спасибо за сообщение! Пожалуйста, заполните форму ниже.
  - type: textarea
    id: description
    attributes:
      label: Описание ошибки
      description: Краткое описание проблемы
      placeholder: Что произошло?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
      description: Что должно было произойти?
      placeholder: Опишите ожидаемый результат
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
      description: Как воспроизить ошибку?
      placeholder: |
        1. Перейти на страницу...
        2. Нажать кнопку...
        3. Увидеть ошибку...
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Браузер
      placeholder: Chrome 120, Firefox 121, etc.
  - type: input
    id: os
    attributes:
      label: Операционная система
      placeholder: macOS, Windows 11, Linux
  - type: textarea
    id: screenshots
    attributes:
      label: Скриншоты
      description: Приложите скриншоты если возможно
